name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name ExcelAutomation --collect-all openpyxl main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelAutomation-windows-exe
          path: dist/ExcelAutomation.exe
